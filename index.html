<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еӨ–йғЁгғ–гғ©гӮҰгӮ¶гҒ§й–ӢгҒ„гҒҰгҒӯрҹ’–</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap');

  body {
    font-family: 'Baloo 2', cursive;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffd1dc, #ffb6c1);
    text-align: center;
    color: #333;
  }

  .container {
    background: #fff0f5;
    padding: 30px 25px;
    border-radius: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    max-width: 320px;
    width: 90%;
  }

  h2 {
    color: #ff69b4;
    margin-bottom: 15px;
    font-size: 1.6em;
  }

  p {
    font-size: 1em;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: 1px solid #ffb6c1;
    text-align: center;
    font-size: 16px;
    margin-bottom: 15px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #ff69b4;
    color: white;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #ff85c1;
  }

</style>
</head>
<body>
<div class="container">
  <h2>рҹ’Ң еӨ–йғЁгғ–гғ©гӮҰгӮ¶гҒ§й–ӢгҒ„гҒҰгҒӯпјҒ</h2>
  <p>дёӢгҒ®URLгӮ’гӮігғ”гғјгҒ—гҒҰгҖҒSafariгӮ„ChromeгҒ«иІјгӮҠд»ҳгҒ‘гҒҰй–ӢгҒ“гҒҶрҹ’–</p>
  <input type="text" id="urlField" value="https://renaikenkyuzyo.github.io/rena ikenkyuzyonoapp/"#readonly>
  <button onclick="copyURL()">гӮігғ”гғјгҒҷгӮӢ</button>
</div>

<script>
function copyURL() {
  const urlField = document.getElementById('urlField');
  urlField.select();
  urlField.setSelectionRange(0, 99999); // гғўгғҗгӮӨгғ«еҜҫеҝң
  navigator.clipboard.writeText(urlField.value).then(() => {
    alert('рҹ’– URLгӮ’гӮігғ”гғјгҒ—гҒҫгҒ—гҒҹпјҒSafariгӮ„ChromeгҒ«иІјгӮҠд»ҳгҒ‘гҒҰй–ӢгҒ„гҒҰгҒӯ рҹ’–');
  });
}
</script>
</body>
</html>
